<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E5B842"/>
      <stop offset="100%" style="stop-color:#c9972a"/>
    </linearGradient>
    <linearGradient id="lensGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1D3557"/>
      <stop offset="100%" style="stop-color:#0f2035"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="rgba(0,0,0,0.2)"/>
    </filter>
  </defs>

  <!-- Camera body -->
  <rect x="8" y="32" width="84" height="52" rx="10" ry="10" fill="url(#bodyGrad)" filter="url(#shadow)"/>

  <!-- Viewfinder bump -->
  <rect x="36" y="22" width="28" height="14" rx="5" ry="5" fill="url(#bodyGrad)"/>

  <!-- Flash -->
  <rect x="14" y="26" width="14" height="8" rx="3" ry="3" fill="#D84B7E"/>

  <!-- Lens outer ring -->
  <circle cx="50" cy="58" r="20" fill="url(#lensGrad)"/>

  <!-- Lens middle ring -->
  <circle cx="50" cy="58" r="15" fill="none" stroke="#2a4a6b" stroke-width="2"/>

  <!-- Lens inner -->
  <circle cx="50" cy="58" r="11" fill="#0f2035"/>

  <!-- Lens shine -->
  <circle cx="44" cy="52" r="4" fill="rgba(255,255,255,0.15)"/>
  <circle cx="43" cy="51" r="2" fill="rgba(255,255,255,0.25)"/>

  <!-- Lens center dot -->
  <circle cx="50" cy="58" r="3" fill="#1D3557"/>

  <!-- Shutter button -->
  <circle cx="78" cy="38" r="6" fill="#D84B7E"/>
  <circle cx="78" cy="38" r="4" fill="#c0396a"/>

  <!-- Left detail dot -->
  <circle cx="18" cy="58" r="3" fill="rgba(255,255,255,0.3)"/>
</svg>
