<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <meta name="theme-color" content="#1D3557">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="LUX Photo">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Pilih Template - LUX Photobooth</title>
  <style>
    :root {
      --orange: #D84B7E; --yellow: #E5B842; --green: #E5B842;
      --pink: #D84B7E; --purple: #1D3557;
      --bg: #FFF8FC; --card: #ffffff; --border: #f5c6da;
      --text: #1D3557; --text2: #6b7fa3;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px 20px 118px;
    }
    body::before {
      content: ''; position: fixed; inset: 0; z-index: -1;
      background-image: radial-gradient(circle, rgba(216,75,126,0.07) 1px, transparent 1px);
      background-size: 28px 28px; background-color: var(--bg);
    }
    .top-bar {
      width: 100%; max-width: 860px; display: flex;
      align-items: center; justify-content: space-between; margin-bottom: 20px;
    }
    .logo-text {
      font-size: 18px; font-weight: 900; letter-spacing: -0.5px;
      background: linear-gradient(135deg, var(--orange), var(--purple));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .admin-btn { display: none; }
    h2 { font-size: 24px; font-weight: 900; margin-bottom: 4px; text-align: center; color: var(--text); }
    p.sub { font-size: 14px; color: var(--text2); margin-bottom: 16px; text-align: center; font-weight: 500; }
    .cat-tabs {
      display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
      margin-bottom: 16px; width: 100%; max-width: 860px;
    }
    .cat-tab {
      padding: 8px 18px; border-radius: 50px; font-size: 13px; font-weight: 700;
      cursor: pointer; border: 2px solid var(--border); background: white; color: var(--text2);
      transition: all 0.15s; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .cat-tab:hover { border-color: var(--orange); color: var(--orange); }
    .cat-tab.active { background: var(--orange); border-color: var(--orange); color: white; box-shadow: 0 4px 14px rgba(216,75,126,0.4); }
    .frame-color-picker {
      display: none; flex-direction: column; align-items: center; gap: 10px;
      margin-bottom: 16px; width: 100%; max-width: 860px;
      background: white; border-radius: 16px; padding: 14px 20px;
      border: 2px solid var(--border); box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    .frame-color-picker.show { display: flex; }
    .frame-color-picker label { font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--text2); }
    .color-swatches { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
    .color-swatch {
      width: 30px; height: 30px; border-radius: 50%; cursor: pointer;
      border: 3px solid transparent; transition: all 0.15s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .color-swatch:hover { transform: scale(1.15); }
    .color-swatch.active { border-color: var(--orange) !important; transform: scale(1.2); box-shadow: 0 4px 12px rgba(216,75,126,0.4); }
    .template-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 12px; width: 100%; max-width: 860px; margin-bottom: 110px;
    }
    .template-card {
      cursor: pointer; border-radius: 16px; overflow: hidden;
      border: 3px solid var(--border); transition: all 0.2s;
      background: white; display: flex; flex-direction: column;
      align-items: center; position: relative;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    .template-card:hover { border-color: var(--orange); transform: translateY(-4px); box-shadow: 0 8px 24px rgba(216,75,126,0.2); }
    .template-card.selected { border-color: var(--orange); box-shadow: 0 0 0 3px rgba(216,75,126,0.25); }
    .template-card img { width: 100%; display: block; }
    .template-name {
      padding: 8px; text-align: center; font-size: 12px; font-weight: 700;
      color: var(--text); width: 100%; background: white; border-top: 1px solid var(--border);
    }
    .selected-badge {
      position: absolute; top: 6px; right: 6px; background: var(--orange);
      color: white; font-size: 11px; font-weight: 700; padding: 3px 8px;
      border-radius: 50px; display: none;
    }
    .template-card.selected .selected-badge { display: block; }
    .basic-badge {
      position: absolute; top: 6px; left: 6px; background: var(--yellow);
      color: #3d2600; font-size: 10px; font-weight: 800; padding: 2px 7px;
      border-radius: 50px; z-index: 2;
    }
    .info-box {
      display: none; background: white; border: 2px solid var(--green);
      border-radius: 14px; padding: 12px 20px; font-size: 14px; font-weight: 600;
      color: var(--text); margin-bottom: 16px; text-align: center;
      box-shadow: 0 4px 14px rgba(229,184,66,0.2);
    }
    .btn-row {
      position: fixed;
      left: 50%;
      bottom: calc(14px + env(safe-area-inset-bottom, 0px));
      transform: translateX(-50%);
      z-index: 80;
      display: flex; gap: 12px; width: calc(100% - 28px); max-width: 480px;
      margin: 0;
      padding: 10px;
      border-radius: 999px;
      background: rgba(255, 248, 252, 0.88);
      border: 2px solid rgba(245, 198, 218, 0.92);
      box-shadow: 0 10px 32px rgba(29, 53, 87, 0.16);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }
    .btn {
      flex: 1; display: flex; align-items: center; justify-content: center;
      gap: 8px; border: none; cursor: pointer; font-weight: 700; font-size: 15px;
      padding: 16px 24px; border-radius: 50px; transition: all 0.2s;
    }
    .btn-secondary {
      background: white; color: var(--text2); border: 2px solid var(--border);
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    .btn-secondary:hover { border-color: var(--orange); color: var(--orange); }
    .btn-primary {
      background: #ccc; color: white; opacity: 0.5; pointer-events: none;
      box-shadow: none;
    }
    .btn-primary.aktif {
      background: linear-gradient(135deg, var(--orange), var(--purple));
      opacity: 1; pointer-events: auto;
      box-shadow: 0 6px 20px rgba(216,75,126,0.45);
    }
    .btn-primary.aktif:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(216,75,126,0.5); }
    @media (max-width: 430px) {
      .btn-row {
        width: calc(100% - 18px);
        gap: 8px;
        padding: 8px;
      }
      .btn {
        font-size: 13px;
        padding: 14px 12px;
      }
    }
    /* Admin modal */
    .modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(45,26,14,0.6);
      backdrop-filter: blur(6px); z-index: 100; align-items: center; justify-content: center;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: white; border-radius: 24px; padding: 28px; width: 300px;
      text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      border: 2px solid var(--border);
    }
    .modal h3 { font-size: 20px; margin-bottom: 8px; color: var(--text); }
    .modal p { font-size: 13px; color: var(--text2); margin-bottom: 16px; }
    .modal input {
      width: 100%; padding: 12px 16px; border-radius: 12px; font-size: 16px;
      border: 2px solid var(--border); outline: none; text-align: center;
      margin-bottom: 14px; color: var(--text); background: var(--bg);
    }
    .modal input:focus { border-color: var(--orange); }
    .modal-btns { display: flex; gap: 10px; }
    .modal-cancel {
      flex: 1; padding: 12px; border-radius: 12px; border: 2px solid var(--border);
      background: white; color: var(--text2); font-weight: 700; cursor: pointer;
    }
    .modal-confirm {
      flex: 1; padding: 12px; border-radius: 12px; border: none;
      background: linear-gradient(135deg, var(--orange), var(--purple));
      color: white; font-weight: 700; cursor: pointer;
      box-shadow: 0 4px 14px rgba(216,75,126,0.4);
    }
    .modal-error { color: #e94560; font-size: 12px; margin-top: 8px; min-height: 18px; font-weight: 600; }
  </style>
</head>

  const builtInCache = new Map();

  function generateBasicSlots() {
    const slotH = Math.floor((FRAME_H - FRAME_PADDING * 2 - FRAME_GAP * (FRAME_SLOTS - 1) - FRAME_FOOTER_H) / FRAME_SLOTS);
    const slotW = FRAME_W - FRAME_PADDING * 2;
    const slots = [];
    for (let i = 0; i < FRAME_SLOTS; i++) {
      slots.push({ x: FRAME_PADDING, y: FRAME_PADDING + i * (slotH + FRAME_GAP), w: slotW, h: slotH });
    }
    return slots;
  }

  // Built-in decorative templates need bigger margins than Basic
  // so the frame ornaments are visible and the photo slots do not feel too tight.
  function generateBuiltInSlots(def = {}) {
    const category = def.category || '';
    let sidePad = 76;
    let topPad = 168;
    let bottomPad = 236;
    let gap = 38;
    let slotCount = FRAME_SLOTS;

    if (category === 'Social Media') {
      sidePad = 128;
      topPad = 222;
      // Social template sebelumnya menyisakan area kosong terlalu besar di bawah slot terakhir.
      // Dibuat lebih rapat supaya slot foto turun dan preview tidak terasa kosong.
      bottomPad = 270;
      gap = 74;
      slotCount = 3;
    } else if (category === 'Korean') {
      sidePad = 78;
      topPad = 176;
      bottomPad = 246;
      gap = 40;
    } else if (category === 'Film') {
      sidePad = 84;
      topPad = 178;
      bottomPad = 272;
      gap = 42;
    } else if (category === 'Elegant') {
      sidePad = 70;
      topPad = 162;
      bottomPad = 232;
      gap = 36;
    } else if (category === 'Floral') {
      sidePad = 80;
      topPad = 172;
      bottomPad = 244;
      gap = 40;
    } else if (category === 'Seasonal') {
      sidePad = 74;
      topPad = 170;
      bottomPad = 240;
      gap = 38;
    } else if (category === 'Gaming') {
      sidePad = 72;
      topPad = 166;
      bottomPad = 236;
      gap = 36;
    } else if (category === 'Pattern') {
      sidePad = 78;
      topPad = 170;
      bottomPad = 242;
      gap = 38;
    }

    const slotW = FRAME_W - sidePad * 2;
    const slotH = Math.floor((FRAME_H - topPad - bottomPad - gap * (slotCount - 1)) / slotCount);
    const slots = [];
    for (let i = 0; i < slotCount; i++) {
      slots.push({ x: sidePad, y: topPad + i * (slotH + gap), w: slotW, h: slotH, r: 0 });
    }
    return slots;
  }

  function withAlpha(hex, alpha) {
    const h = (hex || '#000000').replace('#', '');
    const n = parseInt(h.length === 3 ? h.split('').map(x => x + x).join('') : h, 16);
    const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
    return `rgba(${r},${g},${b},${alpha})`;
  }

  function roundRect(ctx, x, y, w, h, r, fill, stroke, lw = 2) {
    const rr = Math.min(r, w / 2, h / 2);
    ctx.beginPath();
    ctx.moveTo(x + rr, y);
    ctx.lineTo(x + w - rr, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + rr);
    ctx.lineTo(x + w, y + h - rr);
    ctx.quadraticCurveTo(x + w, y + h, x + w - rr, y + h);
    ctx.lineTo(x + rr, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - rr);
    ctx.lineTo(x, y + rr);
    ctx.quadraticCurveTo(x, y, x + rr, y);
    if (fill) { ctx.fillStyle = fill; ctx.fill(); }
    if (stroke) { ctx.lineWidth = lw; ctx.strokeStyle = stroke; ctx.stroke(); }
  }

  function circle(ctx, x, y, r, color, stroke) {
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2);
    if (color) { ctx.fillStyle = color; ctx.fill(); }
    if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = 2; ctx.stroke(); }
  }

  function text(ctx, value, x, y, size, color, weight = 900, align = 'center') {
    ctx.save();
    ctx.font = `${weight} ${size}px 'Trebuchet MS', 'Segoe UI', Arial, sans-serif`;
    ctx.fillStyle = color;
    ctx.textAlign = align;
    ctx.textBaseline = 'middle';
    ctx.fillText(value, x, y);
    ctx.restore();
  }

  function line(ctx, x1, y1, x2, y2, color, width = 3) {
    ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
    ctx.strokeStyle = color; ctx.lineWidth = width; ctx.lineCap = 'round'; ctx.stroke();
  }

  function drawStar(ctx, x, y, r, color, points = 5) {
    ctx.save();
    ctx.beginPath();
    for (let i = 0; i < points * 2; i++) {
      const rr = i % 2 === 0 ? r : r * 0.42;
      const a = -Math.PI / 2 + i * Math.PI / points;
      const px = x + Math.cos(a) * rr;
      const py = y + Math.sin(a) * rr;
      if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
    ctx.closePath(); ctx.fillStyle = color; ctx.fill();
    ctx.restore();
  }

  function drawBow(ctx, x, y, color, lineColor) {
    ctx.save();
    ctx.fillStyle = color;
    ctx.strokeStyle = lineColor || color;
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.ellipse(x - 18, y, 20, 12, -0.3, 0, Math.PI * 2); ctx.fill(); ctx.stroke();

    circle(ctx, x, y, 8, lineColor || '#fff');
    ctx.restore();

      ctx.save();
      ctx.translate(x, y);
      ctx.rotate((i % 9) * .35);
      ctx.fillStyle = c;
      if (i % 3 === 0) ctx.fillRect(-4, -10, 8, 20);

          roundRect(ctx, s.x + 12, s.y + s.h - 26, (s.w - 24) * ([.28, .52, .76][idx]), 9, 5, def.accent);
          text(ctx, ['0:18','0:58','1:42'][idx], s.x + s.w - 12, s.y + 20, 11.6, withAlpha(def.ink, .74), 800, 'right');
        } else if (def.motif === 'chat') {
          roundRect(ctx, s.x + s.w - 94, s.y + 10, 78, 20, 10, withAlpha(def.accent, .22), withAlpha(def.accent, .32), 1);
          text(ctx, idx % 2 ? 'typing...' : 'seen', s.x + s.w - 55, s.y + 24, 10.8, def.ink, 700);
        } else if (def.motif === 'tiktok') {
          text(ctx, '♪', s.x + 16, s.y + 20, 18, def.accent);
          text(ctx, socialCounts[idx][0], s.x + s.w - 12, s.y + s.h - 16, 12.2, '#ffffff', 800, 'right');
        } else if (def.motif === 'iphone' || def.motif === 'cameraRoll') {
          text(ctx, ['LIVE','HDR','RAW'][idx], s.x + s.w - 14, s.y + 20, 11.8, def.ink, 800, 'right');
          text(ctx, ['1 Jun','6 Jun','10 Jun'][idx], s.x + 12, s.y + s.h + 24, 11.6, withAlpha(def.ink, .72), 800, 'left');
        } else {
          text(ctx, socialCounts[idx][0], s.x + 12, s.y + s.h + 24, 11.6, withAlpha(def.ink, .76), 800, 'left');
          text(ctx, socialCounts[idx][1], s.x + s.w - 12, s.y + s.h + 24, 11.6, withAlpha(def.ink, .76), 800, 'right');
        }
      } else {
        corners.forEach(([cx, cy], cidx) => {
          const icon = ['✦', '♡', '✿', '★'][(idx + cidx) % 4];
          text(ctx, icon, cx, cy, 13, withAlpha(cidx % 2 ? def.accent2 : def.accent, .95));
        });
      }

      if (idx < slots.length - 1) {
        const gapY = s.y + s.h + (slots[idx + 1].y - (s.y + s.h)) / 2;
        if (def.category === 'Film') {
          text(ctx, ['01','02','03'][idx], FRAME_W / 2, gapY + 2, 14, withAlpha(def.ink, .82), 900);
          line(ctx, 100, gapY, FRAME_W / 2 - 30, gapY, withAlpha(def.accent2, .36), 1.5);
          line(ctx, FRAME_W / 2 + 30, gapY, FRAME_W - 100, gapY, withAlpha(def.accent2, .36), 1.5);
        } else if (def.category === 'Gaming') {
          roundRect(ctx, FRAME_W / 2 - 52, gapY - 12, 104, 24, 8, withAlpha(def.accent, .18), withAlpha(def.accent2, .42), 1.5);
          const gamingGap = def.motif === 'pixel' || def.motif === 'arcade' ? ['1UP','READY','GO!'][idx]
            : def.motif === 'rpg' || def.motif === 'fantasy' || def.motif === 'magic' ? ['QUEST','MAGIC','LOOT'][idx]
            : def.motif === 'cyber' || def.motif === 'space' ? ['SCAN','SYNC','DATA'][idx]
            : def.motif === 'monster' || def.motif === 'dungeon' ? ['DANGER','BOSS','ITEM'][idx]
            : ['P1','P2','P3'][idx];
          text(ctx, gamingGap, FRAME_W / 2, gapY + 1, 12, def.ink, 900);
        } else if (def.category === 'Social Media') {
          const socialGap = def.motif === 'youtube' ? ['posted 2d ago','watch next ✨'][idx]
            : def.motif === 'tiktok' ? ['on your fyp','saved to favorites'][idx]
            : def.motif === 'music' ? ['now playing','repeat-worthy'][idx]
            : def.motif === 'iphone' || def.motif === 'cameraRoll' ? ['camera roll','best angle only'][idx]
            : def.motif === 'chat' ? ['group chat chaos','bestie approved'][idx]
            : ['soft launch energy','too pretty to scroll past'][idx];
          roundRect(ctx, FRAME_W / 2 - 98, gapY - 14, 196, 28, 12, withAlpha(def.accent, .1), withAlpha(def.accent2, .28), 1.2);
          text(ctx, socialGap, FRAME_W / 2, gapY + 1, 14, def.ink, 800);
        } else {
          text(ctx, ['✦','♡','★','✿'][idx % 4], FRAME_W / 2, gapY + 1, 20, withAlpha(def.accent2, .92));
          line(ctx, 110, gapY, FRAME_W / 2 - 26, gapY, withAlpha(def.accent, .24), 1.5);
          line(ctx, FRAME_W / 2 + 26, gapY, FRAME_W - 110, gapY, withAlpha(def.accent, .24), 1.5);
        }
      }
    });
  }

  function drawLuxCameraMark(ctx, x, y, size, bodyColor, lensColor) {
    const bodyW = size * 1.34;
    const bodyH = size * .82;
    roundRect(ctx, x - bodyW / 2, y - bodyH / 2, bodyW, bodyH, size * .18, bodyColor);
    roundRect(ctx, x - bodyW * .28, y - bodyH * .72, bodyW * .30, bodyH * .30, size * .08, bodyColor);
    circle(ctx, x, y, size * .25, lensColor);
    circle(ctx, x, y, size * .11, withAlpha('#ffffff', .68));
    circle(ctx, x + bodyW * .30, y - bodyH * .18, size * .06, withAlpha('#ffffff', .82));
  }

  function drawPhotostripBranding(ctx, def, slots, options = {}) {
    const isBasic = options.isBasic === true;
    const ink = def.ink || def.text || '#1D3557';
    const accent = def.accent || ink;
    const accent2 = def.accent2 || '#D84B7E';
    const last = slots[slots.length - 1];
    const zoneTop = last.y + last.h;

    if (isBasic) {
      const centerY = zoneTop + (FRAME_H - zoneTop) * .52;
      line(ctx, 82, zoneTop + 19, FRAME_W - 82, zoneTop + 19, withAlpha(ink, .22), 1.5);
      drawLuxCameraMark(ctx, FRAME_W / 2 - 112, centerY - 5, 25, withAlpha(ink, .94), colorObjSafeContrast(accent2, ink));
      text(ctx, 'LUX PHOTOBOOTH', FRAME_W / 2 + 16, centerY - 8, 22, ink, 950);
      text(ctx, 'MAKE EVERY MOMENT LUX', FRAME_W / 2, centerY + 22, 10, withAlpha(ink, .72), 800);
      return;
    }

    const category = def.category || 'Pattern';
    let label = 'LUX PHOTOBOOTH';
    let width = 292;
    let fontSize = 16;
    let fill = withAlpha('#ffffff', .74);
    let stroke = withAlpha(accent, .44);
    let color = ink;
    let iconBody = accent;
    let iconLens = accent2;

    if (category === 'Korean') {
      label = 'lux photobooth ♡';
      width = 248;
      fill = withAlpha('#ffffff', .82);
      stroke = withAlpha(accent2, .52);
      color = '#6d3e66';
      fontSize = 16;
    } else if (category === 'Film') {
      label = 'LUX PHOTOBOOTH / 35MM';
      width = 316;
      fill = withAlpha('#050505', .82);
      stroke = withAlpha(accent, .72);
      color = '#ffffff';
      iconBody = accent;
      iconLens = color;
      fontSize = 14;
    } else if (category === 'Elegant') {
      label = 'L U X  P H O T O B O O T H';
      width = 342;
      fill = withAlpha(def.bg, .86);
      stroke = withAlpha(accent, .66);
      fontSize = 13;
    } else if (category === 'Floral') {
      label = 'LUX PHOTOBOOTH ✿';
      width = 274;
      fill = withAlpha('#ffffff', .79);
      stroke = withAlpha(accent2, .56);
      color = '#6b294f';
      fontSize = 15;
    } else if (category === 'Seasonal') {
      label = 'LUX PHOTOBOOTH • CELEBRATE';
      width = 338;
      fill = withAlpha('#ffffff', .76);
      stroke = withAlpha(accent, .58);
      color = '#1D3557';
      fontSize = 13;
    } else if (category === 'Gaming') {
      label = 'LUX PHOTOBOOTH // PLAYER CAM';
      width = 350;
      fill = withAlpha('#050816', .84);
      stroke = withAlpha(accent2, .76);
      color = '#ffffff';
      iconBody = accent;
      iconLens = accent2;
      fontSize = 13;
    } else if (category === 'Pattern') {
      label = 'LUX PHOTOBOOTH ★';
      width = 274;
      fill = withAlpha('#ffffff', .76);
      stroke = withAlpha(accent, .54);
      color = '#1D3557';
      fontSize = 15;
    } else if (category === 'Social Media') {
      label = 'LUX PHOTOBOOTH • @luxphotobooth';
      width = 374;
      fill = withAlpha('#ffffff', .88);
      stroke = withAlpha(accent, .54);
      color = '#1D3557';
      fontSize = 12;
    }

    const y = FRAME_H - 49;
    const h = 40;
    roundRect(ctx, FRAME_W / 2 - width / 2, y - h / 2, width, h, 20, fill, stroke, 1.8);
    drawLuxCameraMark(ctx, FRAME_W / 2 - width / 2 + 27, y, 19, iconBody, iconLens);
    text(ctx, label, FRAME_W / 2 + 12, y + 1, fontSize, color, 900);

    // Small monogram gives every frame a consistent LUX signature without covering photos.
    const sealX = FRAME_W - 46;
    const sealY = 48;
    circle(ctx, sealX, sealY, 22, withAlpha((category === 'Film' || category === 'Gaming') ? '#ffffff' : accent, .16), stroke);
    text(ctx, 'LUX', sealX, sealY + 1, 9, color, 950);
  }

  function colorObjSafeContrast(primary, fallback) {
    return primary || fallback || '#D84B7E';
  }

  // Render basic frame as PNG using canvas (591x1772)
  function generateBasicFrameSrc(colorObj) {
    const W = FRAME_W, H = FRAME_H;
    const slots = generateBasicSlots();
    const c = document.createElement('canvas');
    c.width = W; c.height = H;
    const ctx = c.getContext('2d');
    ctx.fillStyle = colorObj.bg;
    ctx.fillRect(0, 0, W, H);
    slots.forEach(s => ctx.clearRect(s.x, s.y, s.w, s.h));
    drawPhotostripBranding(ctx, { text: colorObj.text, accent: colorObj.text, accent2: '#D84B7E' }, slots, { isBasic: true });
    return { src: c.toDataURL('image/png'), slots, w: W, h: H };
  }

  function generateBuiltInFrameSrc(def) {
    if (builtInCache.has(def.id)) return builtInCache.get(def.id);
    const W = FRAME_W, H = FRAME_H;
    const slots = generateBuiltInSlots(def);
    const c = document.createElement('canvas');
    c.width = W; c.height = H;
    const ctx = c.getContext('2d');
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';

    // Background
    ctx.fillStyle = def.bg;
    ctx.fillRect(0, 0, W, H);

    // Base decorative layer
    drawPatternBg(ctx, def);
    if (def.category === 'Korean') drawKoreanDecor(ctx, def);
    if (def.category === 'Film') drawFilmDecor(ctx, def);
    if (def.category === 'Elegant') drawElegantDecor(ctx, def);
    if (def.category === 'Floral') drawFloralDecor(ctx, def);
    if (def.category === 'Seasonal') drawSeasonalDecor(ctx, def);
    if (def.category === 'Gaming') drawGamingDecor(ctx, def);
    if (def.category === 'Pattern') {
      if (def.motif === 'stars') for (let i=0;i<70;i++) drawStar(ctx, (i*79)%W, (i*151)%H, 8+(i%3)*3, i%2?def.accent:def.accent2, 5);
      if (def.motif === 'heart') for (let i=0;i<72;i++) text(ctx, i%2?'♡':'♥', (i*67)%W, (i*131)%H, 22, i%2?def.accent:def.accent2);
      drawConfetti(ctx, def, 28);
    }
    if (def.category === 'Social Media') drawSocialDecor(ctx, def);
    drawReservedZones(ctx, slots, def);

    // Clear photo slots so the captured photos show through.
    slots.forEach(s => ctx.clearRect(s.x, s.y, s.w, s.h));

    // Foreground frame layer stays on top of photos.
    drawSlotBorders(ctx, slots, def);
    roundRect(ctx, 12, 12, W - 24, H - 24, 30, null, withAlpha(def.accent, .54), 3.5);
    roundRect(ctx, 26, 26, W - 52, H - 52, 24, null, withAlpha('#ffffff', .28), 1.5);
    drawPhotostripBranding(ctx, def, slots);

    const data = { src: c.toDataURL('image/png'), slots, w: W, h: H };
    builtInCache.set(def.id, data);
    return data;
  }


  function generatePhotoboxSlots(layout) {
    const X = 76, Y = 210, W = 1029, H = 1320, G = 28;
    const slots = [];
    const add = (x, y, w, h) => slots.push({ x: Math.round(x), y: Math.round(y), w: Math.round(w), h: Math.round(h), r: 0 });
    const grid = (cols, rows, x = X, y = Y, w = W, h = H, gap = G) => {
      const cw = (w - gap * (cols - 1)) / cols;
      const ch = (h - gap * (rows - 1)) / rows;
      for (let row = 0; row < rows; row++) {
        for (let col = 0; col < cols; col++) add(x + col * (cw + gap), y + row * (ch + gap), cw, ch);
      }
    };

    switch (layout) {
      // Single-photo templates intentionally use almost the full printable area.
      case 'one_cloud': add(70, 190, 1041, 1450); break;
      case 'one_film': add(82, 205, 1017, 1428); break;
      case 'one_luxury': add(76, 192, 1029, 1446); break;
      case 'one_floral': add(86, 205, 1009, 1428); break;

      case 'two_stack': grid(1, 2, 88, 230, 1005, 1190, 46); break;
      case 'two_split': grid(2, 1, 78, 250, 1025, 1170, 34); break;
      case 'two_hero': add(88, 220, 1005, 790); add(190, 1060, 801, 370); break;
      case 'two_diagonal': add(78, 245, 935, 565); add(168, 875, 935, 565); break;

      case 'three_triptych': grid(3, 1, 76, 245, 1029, 1175, 24); break;
      case 'three_hero_pair': add(86, 220, 1009, 650); grid(2, 1, 86, 915, 1009, 510, 30); break;
      case 'three_stack': grid(1, 3, 92, 220, 997, 1210, 28); break;
      case 'three_story': add(78, 230, 620, 1190); grid(1, 2, 728, 230, 375, 1190, 34); break;

      case 'four_grid': grid(2, 2, 82, 225, 1017, 1200, 32); break;
      case 'four_stack': grid(1, 4, 102, 220, 977, 1210, 24); break;
      case 'four_hero_three': add(84, 220, 1013, 650); grid(3, 1, 84, 915, 1013, 510, 24); break;
      case 'four_grid_wide': grid(2, 2, 70, 260, 1041, 1120, 22); break;
      case 'four_bands': add(80, 220, 650, 365); add(760, 220, 340, 365); add(80, 620, 340, 805); add(450, 620, 650, 805); break;

      case 'five_feature': add(78, 225, 610, 1200); grid(1, 4, 718, 225, 385, 1200, 24); break;
      case 'five_top_hero': add(82, 220, 1017, 610); grid(2, 2, 82, 870, 1017, 555, 28); break;
      case 'five_mosaic': grid(2, 1, 82, 225, 1017, 520, 28); grid(3, 1, 82, 785, 1017, 640, 24); break;
      case 'five_stripmix': add(78, 225, 350, 1200); grid(2, 2, 458, 225, 645, 1200, 24); break;

      case 'six_grid_2x3': grid(2, 3, 80, 220, 1021, 1210, 26); break;
      case 'six_grid_3x2': grid(3, 2, 72, 255, 1037, 1135, 22); break;
      case 'six_hero_five': add(80, 220, 1021, 620); grid(5, 1, 80, 880, 1021, 545, 18); break;
      case 'six_story': grid(2, 3, 92, 220, 997, 1210, 34); break;

      case 'seven_3_4': grid(3, 1, 76, 225, 1029, 535, 22); grid(4, 1, 76, 800, 1029, 625, 18); break;
      case 'seven_feature': add(76, 225, 510, 1200); grid(2, 3, 614, 225, 491, 1200, 20); break;
      case 'seven_story': grid(2, 1, 82, 220, 1017, 350, 26); grid(3, 1, 82, 610, 1017, 420, 22); grid(2, 1, 82, 1070, 1017, 355, 26); break;

      case 'eight_2x4': grid(2, 4, 82, 220, 1017, 1210, 22); break;
      case 'eight_4x2': grid(4, 2, 70, 270, 1041, 1090, 18); break;
      case 'eight_mosaic': grid(2, 1, 80, 220, 1021, 340, 28); grid(4, 1, 80, 600, 1021, 440, 18); grid(2, 1, 80, 1080, 1021, 345, 28); break;
      default: grid(2, 2, 82, 225, 1017, 1200, 32);
    }
    return slots;
  }

  function drawPhotoboxBackground(ctx, def, W, H) {
    ctx.fillStyle = def.bg;
    ctx.fillRect(0, 0, W, H);
    const motif = def.motif || 'dots';
    const a = def.accent;
    const b = def.accent2;

    const drawPaper = () => {
      for (let y = 100; y < H; y += 54) line(ctx, 0, y, W, y, withAlpha(a, .08), 1);
      line(ctx, 128, 0, 128, H, withAlpha('#ef4444', .12), 2);
      for (let i = 0; i < 80; i++) circle(ctx, (i * 151) % W, (i * 97) % H, 2, withAlpha(a, .08));
    };
    const drawFilm = () => {
      ctx.fillStyle = withAlpha(a, .12); ctx.fillRect(0, 0, W, 78); ctx.fillRect(0, H - 78, W, 78);
      for (let x = 24; x < W; x += 72) {
        roundRect(ctx, x, 20, 38, 30, 5, withAlpha(b, .72));
        roundRect(ctx, x, H - 50, 38, 30, 5, withAlpha(b, .72));
      }
      for (let i = 0; i < 150; i++) circle(ctx, (i * 83) % W, (i * 137) % H, 1 + (i % 3), withAlpha('#ffffff', .12));
    };
    const drawFloral = (leafOnly = false) => {
      for (let i = 0; i < 42; i++) {
        const x = 32 + (i * 181) % (W - 64), y = 48 + (i * 223) % (H - 96);
        ctx.save(); ctx.translate(x, y); ctx.rotate((i % 8) * Math.PI / 4);
        ctx.fillStyle = withAlpha(i % 2 ? a : b, leafOnly ? .15 : .21);
        ctx.beginPath(); ctx.ellipse(0, 0, 8 + (i % 3) * 4, 22 + (i % 4) * 3, 0, 0, Math.PI * 2); ctx.fill(); ctx.restore();
        if (!leafOnly && i % 3 === 0) circle(ctx, x, y, 6, withAlpha(a, .30));
      }
    };
    const drawHearts = () => {
      for (let i = 0; i < 60; i++) text(ctx, i % 2 ? '♡' : '♥', 28 + (i * 67) % (W - 56), 70 + (i * 109) % (H - 140), 16 + (i % 3) * 4, withAlpha(i % 2 ? a : b, .18), 800);
    };
    const drawStars = (alpha = .23) => {
      for (let i = 0; i < 80; i++) text(ctx, i % 3 ? '✦' : '★', 24 + (i * 79) % (W - 48), 64 + (i * 131) % (H - 128), 10 + (i % 4) * 4, withAlpha(i % 2 ? a : b, alpha), 800);
    };
    const drawConfettiPattern = () => {
      for (let i = 0; i < 120; i++) {
        const x = (i * 97) % W, y = (i * 173) % H;
        ctx.save(); ctx.translate(x, y); ctx.rotate(i * .67);
        ctx.fillStyle = withAlpha(i % 2 ? a : b, .24); ctx.fillRect(-3, -10, 6, 20); ctx.restore();
      }
    };
    const drawGrid = () => {
      for (let x = 0; x < W; x += 72) line(ctx, x, 0, x, H, withAlpha(a, .09), 1);
      for (let y = 0; y < H; y += 72) line(ctx, 0, y, W, y, withAlpha(b, .10), 1);
    };

    if (motif === 'minimal') {
      for (let i = -H; i < W; i += 90) line(ctx, i, 0, i + H, H, withAlpha(a, .055), 2);
    } else if (motif === 'grid' || motif === 'cameraRoll' || motif === 'igfeed') {
      drawGrid();
      if (motif === 'igfeed') {
        for (let i = 0; i < 18; i++) {
          const x = 28 + (i * 211) % (W - 80), y = 52 + (i * 157) % (H - 110);
          roundRect(ctx, x, y, 40, 40, 12, withAlpha(i % 2 ? a : b, .12));
          circle(ctx, x + 20, y + 20, 8, withAlpha(def.ink, .13));
        }
      }
    } else if (motif === 'checker' || motif === 'pixel') {
      const s = motif === 'pixel' ? 48 : 72;
      for (let y = 0; y < H; y += s) for (let x = 0; x < W; x += s) {
        if (((x / s) + (y / s)) % 2 === 0) { ctx.fillStyle = withAlpha(a, motif === 'pixel' ? .14 : .09); ctx.fillRect(x, y, s, s); }
      }
      if (motif === 'pixel') for (let i = 0; i < 38; i++) roundRect(ctx, (i * 103) % W, (i * 173) % H, 14 + (i % 3) * 8, 14 + (i % 3) * 8, 2, withAlpha(i % 2 ? a : b, .24));
    } else if (motif === 'stripe') {
      ctx.save(); ctx.translate(W / 2, H / 2); ctx.rotate(-0.24); ctx.translate(-W / 2, -H / 2);
      for (let y = -H; y < H * 2; y += 88) { ctx.fillStyle = withAlpha((Math.floor(y / 88) % 2) ? a : b, .18); ctx.fillRect(-W, y, W * 3, 34); }
      ctx.restore();
    } else if (motif === 'waves' || motif === 'summer') {
      for (let y = 40; y < H; y += 90) {
        ctx.beginPath(); ctx.strokeStyle = withAlpha((y / 90) % 2 ? a : b, .15); ctx.lineWidth = 4;
        ctx.moveTo(0, y);
        for (let x = 0; x <= W; x += 50) ctx.quadraticCurveTo(x + 25, y - 18, x + 50, y);
        ctx.stroke();
      }
      if (motif === 'summer') for (let i = 0; i < 20; i++) text(ctx, i % 2 ? '☀' : '✦', 35 + (i * 151) % (W - 70), 70 + (i * 217) % (H - 140), 20, withAlpha(i % 2 ? a : b, .19), 800);
    } else if (['film', 'grain', 'cinema'].includes(motif)) {
      drawFilm();
    } else if (['paper', 'diary', 'polaroid'].includes(motif)) {
      drawPaper();
      if (motif === 'diary') for (let i = 0; i < 18; i++) text(ctx, i % 2 ? '♡' : '✎', 32 + (i * 127) % (W - 64), 78 + (i * 181) % (H - 156), 20, withAlpha(i % 2 ? a : b, .18), 800);
      if (motif === 'polaroid') for (let i = 0; i < 14; i++) { ctx.save(); ctx.translate(50 + (i * 177) % (W - 100), 62 + (i * 239) % (H - 124)); ctx.rotate((i % 2 ? 1 : -1) * .16); roundRect(ctx, -28, -9, 56, 18, 4, withAlpha('#fef3c7', .55)); ctx.restore(); }
    } else if (motif === 'cloud') {
      for (let i = 0; i < 24; i++) {
        const x = (i * 211) % W, y = 80 + (i * 173) % (H - 160);
        circle(ctx, x, y, 28 + (i % 3) * 10, withAlpha(i % 2 ? a : b, .12));
        circle(ctx, x + 34, y + 8, 22 + (i % 2) * 8, withAlpha(i % 2 ? a : b, .10));
      }
    } else if (['floral', 'sakura', 'rose', 'wild'].includes(motif)) {
      drawFloral(false);
    } else if (['botanical', 'leaf', 'latte'].includes(motif)) {
      drawFloral(true);
      if (motif === 'latte') for (let i = 0; i < 18; i++) circle(ctx, 46 + (i * 179) % (W - 92), 64 + (i * 227) % (H - 128), 18 + (i % 3) * 6, withAlpha(i % 2 ? a : b, .10));
    } else if (['hearts', 'valentine'].includes(motif)) {
      drawHearts();
    } else if (['stars', 'sparkle', 'royal'].includes(motif)) {
      drawStars(motif === 'royal' ? .18 : .23);
      if (motif === 'royal') {
        roundRect(ctx, 18, 18, W - 36, H - 36, 28, null, withAlpha(a, .36), 3);
        roundRect(ctx, 42, 42, W - 84, H - 84, 22, null, withAlpha(b, .16), 2);
      }
    } else if (['luxury', 'pearl', 'wedding'].includes(motif)) {
      const grad = ctx.createRadialGradient(W / 2, H / 3, 40, W / 2, H / 2, W);
      grad.addColorStop(0, withAlpha(b, .16)); grad.addColorStop(1, def.bg);
      ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);
      for (let i = 0; i < 44; i++) {
        const x = 34 + (i * 193) % (W - 68), y = 48 + (i * 251) % (H - 96);
        if (motif === 'pearl') circle(ctx, x, y, 5 + (i % 3) * 3, withAlpha(i % 2 ? a : b, .18));
        else text(ctx, i % 3 ? '✦' : '◇', x, y, 12 + (i % 3) * 4, withAlpha(i % 2 ? a : b, .18), 800);
      }
      if (motif === 'wedding') drawFloral(true);
    } else if (['neon', 'arcade'].includes(motif)) {
      const grad = ctx.createLinearGradient(0, 0, W, H); grad.addColorStop(0, def.bg); grad.addColorStop(.5, withAlpha(a, .18)); grad.addColorStop(1, withAlpha(b, .22)); ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);
      for (let i = 0; i < 16; i++) line(ctx, 0, 90 + i * 110, W, 20 + i * 110, withAlpha(i % 2 ? a : b, .18), 3);
      if (motif === 'arcade') for (let i = 0; i < 28; i++) roundRect(ctx, 28 + (i * 139) % (W - 56), 54 + (i * 197) % (H - 108), 18 + (i % 4) * 7, 18 + (i % 4) * 7, 3, withAlpha(i % 2 ? a : b, .20));
    } else if (motif === 'geometry') {
      for (let i = 0; i < 32; i++) {
        const x = (i * 149) % W, y = (i * 211) % H, size = 20 + (i % 5) * 12;
        roundRect(ctx, x, y, size, size, i % 2 ? 4 : size / 2, withAlpha(i % 2 ? a : b, .12));
      }
    } else if (motif === 'retro') {
      const grad = ctx.createLinearGradient(0, 0, 0, H); grad.addColorStop(0, withAlpha(a, .10)); grad.addColorStop(1, withAlpha(b, .16)); ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);
      for (let y = 0; y < H; y += 84) { ctx.fillStyle = withAlpha(y % 168 ? a : b, .08); ctx.fillRect(0, y, W, 42); }
      for (let i = 0; i < 30; i++) circle(ctx, 40 + (i * 173) % (W - 80), 50 + (i * 109) % (H - 100), 10 + (i % 4) * 5, withAlpha(a, .12));
    } else if (['confetti', 'birthday'].includes(motif)) {
      drawConfettiPattern();
    } else if (motif === 'christmas') {
      drawStars(.18);
      for (let i = 0; i < 28; i++) text(ctx, i % 2 ? '❄' : '✦', 30 + (i * 151) % (W - 60), 70 + (i * 227) % (H - 140), 18 + (i % 3) * 4, withAlpha(i % 2 ? a : b, .22), 800);
    } else if (motif === 'disco') {
      const grad = ctx.createRadialGradient(W / 2, H / 3, 40, W / 2, H / 3, W); grad.addColorStop(0, withAlpha(a, .28)); grad.addColorStop(1, def.bg); ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);
      for (let y = 0; y < H; y += 58) for (let x = 0; x < W; x += 58) { ctx.fillStyle = withAlpha((x + y) % 116 ? a : b, .12); ctx.fillRect(x + 3, y + 3, 48, 48); }
    } else {
      for (let i = 0; i < 90; i++) circle(ctx, (i * 173) % W, (i * 229) % H, 6 + (i % 4) * 4, withAlpha(i % 2 ? a : b, i % 3 ? .11 : .18));
    }
  }

  function generatePhotoboxFrameSrc(def) {
    const cacheKey = `photobox_${def.id}`;
    if (builtInCache.has(cacheKey)) return builtInCache.get(cacheKey);
    const W = PHOTOBOX_W, H = PHOTOBOX_H;
    const slots = generatePhotoboxSlots(def.layout);
    const c = document.createElement('canvas');
    c.width = W; c.height = H;
    const ctx = c.getContext('2d');
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';

    drawPhotoboxBackground(ctx, def, W, H);

    roundRect(ctx, 34, 34, W - 68, H - 68, 42, withAlpha('#ffffff', .08), withAlpha(def.accent, .42), 4);
    roundRect(ctx, 58, 58, W - 116, H - 116, 34, null, withAlpha(def.accent2, .30), 2);

    const heading = def.title || 'LUX PHOTOBOOTH';
    const headingSize = heading.length > 16 ? 25 : (heading.length > 12 ? 28 : 31);
    text(ctx, heading, W / 2, 110, headingSize, def.ink, 950);
    text(ctx, 'lux photobooth', W / 2, H - 62, 18, withAlpha(def.ink, .68), 850);

    const borderStyle = def.border || 'soft';
    const outerRadius = borderStyle === 'square' || borderStyle === 'film' ? 8 : (borderStyle === 'pill' ? 42 : 28);
    const borderWidth = borderStyle === 'film' ? 10 : 5;
    slots.forEach((s) => {
      ctx.clearRect(s.x, s.y, s.w, s.h);
      roundRect(ctx, s.x - 12, s.y - 12, s.w + 24, s.h + 24, outerRadius, null, withAlpha(def.accent, .76), borderWidth);
      roundRect(ctx, s.x - 2, s.y - 2, s.w + 4, s.h + 4, Math.max(4, outerRadius - 8), null, withAlpha('#ffffff', .92), 3);
    });

    const data = { src: c.toDataURL('image/png'), slots, w: W, h: H };
    builtInCache.set(cacheKey, data);
    return data;
  }

  function getAllPhotoboxTemplates() {
    return PHOTOBOX_DEFS.map(def => {
      const data = generatePhotoboxFrameSrc(def);
      return {
        id: `__photobox_${def.id}__`,
        name: def.name,
        category: def.category,
        productCategory: PHOTOBOX_CATEGORY,
        isBuiltIn: true,
        isPhotobox: true,
        src: data.src,
        slots: data.slots,
        w: data.w,
        h: data.h
      };
    });
  }


  // Generate semua basic template (1 per warna)
  function getAllBasicTemplates() {
    return FRAME_COLORS.map((colorObj, i) => {
      const data = generateBasicFrameSrc(colorObj);
      return {
        id: `__basic_${i}__`,
        name: `Basic ${colorObj.label}`,
        category: '__basic__',
        isBasic: true,
        isBuiltIn: true,
        src: data.src,
        slots: data.slots,
        frameColor: colorObj,
        w: data.w,
        h: data.h
      };
    });
  }

  function getAllBuiltInTemplates() {
    if (isPhotoboxMode) return getAllPhotoboxTemplates();
    return BUILTIN_FRAME_DEFS
      .filter((def) => !HIDDEN_CATEGORIES.includes(def.category))
      .map((def) => {
      const data = generateBuiltInFrameSrc(def);
      return {
        id: `__builtin_${def.id}__`,
        name: def.name,
        category: def.category,
        isBuiltIn: true,
        src: data.src,
        slots: data.slots,
        w: data.w,
        h: data.h
      };
    });
  }

  // Legacy: getBasicTemplate pakai warna yang dipilih
  function getBasicTemplate() {
    const data = generateBasicFrameSrc(selectedFrameColor);
    return {
      id: '__basic__',
      name: 'Frame Basic',
      category: '__basic__',
      isBasic: true,
      isBuiltIn: true,
      src: data.src,
      slots: data.slots,
      frameColor: selectedFrameColor,
      w: data.w,
      h: data.h
    };
  }

  // ─── Local built-in template state ───
  let selectedTemplate = null;
  let currentCat = isPhotoboxMode ? 'Basic' : '__basic__';

  function mapFrameDef(def) {
    const data = generateBuiltInFrameSrc(def);
    return {
      id: `__builtin_${def.id}__`,
      name: def.name,
      category: def.category,
      isBuiltIn: true,
      src: data.src,
      slots: data.slots,
      w: data.w,
      h: data.h
    };
  }

  function mapPhotoboxDef(def) {
    const data = generatePhotoboxFrameSrc(def);
    return {
      id: `__photobox_${def.id}__`,
      name: def.name,
      category: def.category,
      productCategory: PHOTOBOX_CATEGORY,
      layout: def.layout,
      slotCount: def.slots,
      isBuiltIn: true,
      isPhotobox: true,
      src: data.src,
      slots: data.slots,
      w: data.w,
      h: data.h
    };
  }

  function getTemplatesForCurrentCategory() {
    builtInCache.clear();
    if (isPhotoboxMode) {
      return PHOTOBOX_DEFS.filter(def => def.category === currentCat).map(mapPhotoboxDef);
    }
    if (currentCat === '__basic__') return getAllBasicTemplates();
    return BUILTIN_FRAME_DEFS.filter(def => def.category === currentCat).map(mapFrameDef);
  }

  function getCategoryTabs() {
    if (isPhotoboxMode) {
      return PHOTOBOX_CATEGORIES.map(category => ({ label: category, value: category }));
    }
    return [
      { label: 'Basic', value: '__basic__' },
      ...BUILTIN_CATEGORIES.map(category => ({ label: category, value: category }))
    ];
  }

  function renderCatTabs() {
    const el = document.getElementById('catTabs');
    el.replaceChildren();
    getCategoryTabs().forEach(({ label, value }) => {
      const button = document.createElement('button');
      button.type = 'button';
      button.className = `cat-tab ${currentCat === value ? 'active' : ''}`;
      button.textContent = label;
      button.addEventListener('click', () => {
        if (currentCat === value) return;
        currentCat = value;
        selectedTemplate = null;
        document.getElementById('infoBox').style.display = 'none';
        document.getElementById('btnLanjut').classList.remove('aktif');
        renderCatTabs();
        renderTemplates();
      });
      el.appendChild(button);
    });
  }

  function renderColorSwatches() {
    const el = document.getElementById('colorSwatches');
    el.innerHTML = FRAME_COLORS.map((c, i) =>
      `<button type="button" class="color-swatch ${selectedFrameColor === c ? 'active' : ''}"
        style="background:${c.bg}" title="${c.label}" aria-label="Basic ${c.label}"
        onclick="pickFrameColor(${i})"></button>`
    ).join('');
  }

  function pickFrameColor(idx) {
    selectedFrameColor = FRAME_COLORS[idx];
    renderColorSwatches();
  }

  function renderTemplates() {
    const grid = document.getElementById('templateGrid');
    const templates = getTemplatesForCurrentCategory();
    document.getElementById('frameColorPicker').classList.remove('show');
    grid.replaceChildren();

    if (!templates.length) {
      grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:#6b7fa3;padding:48px 24px;font-weight:700">Template tidak tersedia.</div>';
      return;
    }

    templates.forEach(tmpl => {
      const card = document.createElement('button');
      card.type = 'button';
      card.className = 'template-card';
      card.dataset.templateId = tmpl.id;
      const slotLen = Array.isArray(tmpl.slots) ? tmpl.slots.length : 0;
      card.innerHTML = `
        <span class="basic-badge">Built-in</span>
        <span class="selected-badge">✓ Dipilih</span>
        <img src="${tmpl.src}" alt="${tmpl.name}" loading="lazy" style="aspect-ratio:${tmpl.w || 591}/${tmpl.h || 1772};object-fit:cover">
        <span class="template-name">${tmpl.name}<br><span style="color:#6b7fa3;font-size:10px">${slotLen} foto</span></span>`;
      card.addEventListener('click', () => selectTemplate(tmpl, card));
      grid.appendChild(card);
    });

    requestAnimationFrame(() => {
      const firstCard = grid.querySelector('.template-card');
      if (firstCard && templates[0]) selectTemplate(templates[0], firstCard);
    });
  }

  function selectTemplate(tmpl, card) {
    document.querySelectorAll('.template-card').forEach(c => c.classList.remove('selected'));
    card.classList.add('selected');
    selectedTemplate = tmpl;

    localStorage.setItem('templateSrc', tmpl.src);
    localStorage.setItem('templateSlots', JSON.stringify(tmpl.slots || []));
    localStorage.setItem('templateName', tmpl.name || 'Template');
    localStorage.setItem('templateId', tmpl.id || '');
    localStorage.setItem('templateCategory', tmpl.category || '');
    localStorage.setItem('slotCount', String((tmpl.slots || []).length));
    localStorage.setItem('templateW', String(tmpl.w || 591));
    localStorage.setItem('templateH', String(tmpl.h || 1772));
    localStorage.setItem('templateIsBasic', tmpl.isBasic ? '1' : '0');
    localStorage.setItem('templatePhotoLayer', 'behind');
    localStorage.setItem('templateProduct', isPhotoboxMode ? 'photobox' : 'photostrip');

    document.getElementById('slotCount').textContent = String((tmpl.slots || []).length);
    document.getElementById('infoBox').style.display = 'block';
    document.getElementById('btnLanjut').classList.add('aktif');
  }

  function lanjut() {
    if (!selectedTemplate || !(selectedTemplate.slots || []).length) {
      alert('Pilih template yang memiliki slot foto.');
      return;
    }
    localStorage.removeItem('ganciConfig');
    ['photos','filteredPhotos','filteredPhotosStore','livePhotos','finalPhoto','finalPhotoThumb']
      .forEach(key => localStorage.removeItem(key));
    window.location.href = '/camera.html';
  }

  function kembali() { window.location.href = '/'; }

  if (isPhotoboxMode) {
    document.title = 'Pilih Template Photobox 4R - LUX Photobooth';
    document.querySelector('h2').textContent = 'Pilih Template Photobox 4R';
    document.querySelector('.sub').textContent = `${PHOTOBOX_DEFS.length} template photobox built-in tersedia tanpa login`;
    document.getElementById('btnLanjut').textContent = 'Mulai Photobox →';
  } else {
    document.querySelector('.sub').textContent = `${FRAME_COLORS.length + BUILTIN_FRAME_DEFS.length} template photostrip built-in tersedia tanpa login`;
  }

  renderCatTabs();
  renderColorSwatches();
  renderTemplates();
</script>
<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/sw.js").catch(() => {});
  }
</script>
</body>
